<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aforo Turístico — Tingo María</title>
  <link rel="stylesheet" href="/css/styles.css">
  <script src="/socket.io/socket.io.js"></script>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-icon">🌿</div>
    <span>Aforo Turístico</span>
  </div>
  <nav>
    <a href="/login.html" class="btn-nav">Acceso Seguridad</a>
  </nav>
</header>

<section class="hero">
  <div class="hero-content">
    <h1>Monitoreo de aforo en tiempo real</h1>
    <p>Consulta la ocupación actual de los sitios turísticos de la región</p>
  </div>
</section>

<main class="with-hero">
  <div class="stats-bar" id="stats-bar"></div>

  <div class="toolbar-busqueda">
    <div class="busqueda-wrapper">
      <span class="icono-busqueda">🔍</span>
      <input type="search" id="busqueda" placeholder="Buscar por nombre o ubicación..." autocomplete="off">
    </div>
    <div class="filtros-estado">
      <button class="filtro-btn activo" data-filtro="todos">Todos</button>
      <button class="filtro-btn" data-filtro="verde">Disponible</button>
      <button class="filtro-btn" data-filtro="amarillo">Moderado</button>
      <button class="filtro-btn" data-filtro="rojo">Lleno</button>
    </div>
    <div class="contador-resultados" id="contador-resultados"></div>
  </div>

  <div id="sitios" class="grid">
    <div class="empty-state" id="empty-state" style="display:none">
      <div class="empty-icon">🔎</div>
      <h3>No se encontraron sitios</h3>
      <p>Prueba con otro nombre, ubicación o filtro de ocupación.</p>
    </div>
  </div>
</main>

<script src="/js/common.js"></script>
<script>
const socket = io();
const contenedor = document.getElementById('sitios');
const emptyState = document.getElementById('empty-state');
const sitiosMap = {};
let todosLosSitios = [];

async function cargarSitios() {
  const res = await fetch('/api/sitios');
  const sitios = await res.json();
  todosLosSitios = sitios;

  sitios.forEach(s => { sitiosMap[s.id] = s; });

  const cardsHtml = sitios.map(s => renderSitioCard(s)).join('');
  contenedor.insertAdjacentHTML('afterbegin', cardsHtml);

  actualizarStatsBar(sitios);
  initBuscador(sitios.length);
  socket.emit('join_todos_sitios');
}

socket.on('aforo', (data) => {
  actualizarCardAforo(data.sitio_id, data.aforo_actual, sitiosMap);
});

cargarSitios();
</script>

</body>
</html>
