<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Seguridad — Aforo Turístico</title>
  <link rel="stylesheet" href="/css/styles.css">
  <script src="/socket.io/socket.io.js"></script>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-icon">🛡️</div>
    <span>Panel de Seguridad</span>
  </div>
  <nav>
    <span class="nav-user" id="nombre-usuario"></span>
    <a href="#" onclick="cerrarSesion(); return false;">Cerrar sesión</a>
  </nav>
</header>

<main>
  <div class="toolbar-busqueda">
    <div class="busqueda-wrapper">
      <span class="icono-busqueda">🔍</span>
      <input type="search" id="busqueda" placeholder="Buscar sitio asignado..." autocomplete="off">
    </div>
    <div class="filtros-estado">
      <button class="filtro-btn activo" data-filtro="todos">Todos</button>
      <button class="filtro-btn" data-filtro="verde">Disponible</button>
      <button class="filtro-btn" data-filtro="amarillo">Moderado</button>
      <button class="filtro-btn" data-filtro="rojo">Lleno</button>
    </div>
    <div class="contador-resultados" id="contador-resultados"></div>
  </div>

  <div id="sitios" class="grid">
    <div class="empty-state" id="empty-state" style="display:none">
      <div class="empty-icon">🔎</div>
      <h3>No se encontraron sitios</h3>
      <p>Prueba con otro término de búsqueda.</p>
    </div>
  </div>
</main>

<script src="/js/common.js"></script>
<script>
const token = getToken();
const usuario = getUsuario();

if (!token || !usuario || (usuario.rol !== 'seguridad' && usuario.rol !== 'admin')) {
  window.location.href = '/login.html';
}

document.getElementById('nombre-usuario').textContent = usuario.nombre;

const socket = io();
const contenedor = document.getElementById('sitios');
const sitiosMap = {};

async function cargarSitios() {
  const res = await fetch('/api/seguridad/mis-sitios', {
    headers: authHeaders(),
  });

  if (!res.ok) {
    cerrarSesion();
    return;
  }

  const sitios = await res.json();

  if (sitios.length === 0) {
    contenedor.innerHTML = `
      <div class="empty-state" style="display:block">
        <div class="empty-icon">📋</div>
        <h3>Sin sitios asignados</h3>
        <p>Contacta al administrador para que te asigne sitios turísticos.</p>
      </div>
    `;
    return;
  }

  sitios.forEach(s => { sitiosMap[s.id] = s; });

  const cardsHtml = sitios.map(s => renderSitioCard(s, { modoSeguridad: true })).join('');
  contenedor.insertAdjacentHTML('afterbegin', cardsHtml);

  initBuscador(sitios.length);

  sitios.forEach(s => {
    socket.emit('join_sitio', { sitio_id: s.id });
    socket.emit('join_camara', { sitio_id: s.id, token });
  });
}

function enviarAlarma(sitioId) {
  socket.emit('alarma', { sitio_id: sitioId, mensaje: '1' });
  const btn = document.querySelector(`#sitio-${sitioId} .danger`);
  if (btn) {
    const original = btn.textContent;
    btn.textContent = '✓ Alarma enviada';
    btn.disabled = true;
    setTimeout(() => {
      btn.textContent = original;
      btn.disabled = false;
    }, 2000);
  }
}

socket.on('aforo', (data) => {
  actualizarCardAforo(data.sitio_id, data.aforo_actual, sitiosMap);
});

socket.on('frame', (data) => {
  const camaraEl = document.getElementById(`camara-${data.sitio_id}`);
  if (!camaraEl) return;

  let img = camaraEl.querySelector('img');
  if (!img) {
    camaraEl.innerHTML = '';
    img = document.createElement('img');
    camaraEl.appendChild(img);
  }
  img.src = `data:image/jpeg;base64,${data.frame}`;
});

socket.on('error_camara', (data) => {
  const camaraEl = document.getElementById(`camara-${data?.sitio_id}`);
  if (camaraEl) {
    camaraEl.innerHTML = `<div class="camara-placeholder">⚠️ ${data.error}</div>`;
  }
});

cargarSitios();
</script>

</body>
</html>
